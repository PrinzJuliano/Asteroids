language: java
jdk:
  - oraclejdk8
sudo: true
addons:
  apt:
    packages:
        - wget
before-install:
    - cd ~
install:
    - wget -O processing.tgz http://download.processing.org/processing-3.3-linux64.tgz
    - tar xvfz processing.tgz 
    - sudo chmod +x processing-3.3/processing-java
script: ./processing-3.3/processing-java --sketch=$TRAVIS_BUILD_DIR/PrinzJuliano/Asteroids --run DoTravisDebug
