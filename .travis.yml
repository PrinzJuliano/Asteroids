language: java
jdk:
  - oraclejdk8
sudo: true
addons:
  apt:
    packages:
        - wget
        - xvfb
        - libxrender1
        - libxtst6
        - libxi6 
        - screen
install:
    - screen -S display -d -m sudo Xvfb :1 -screen 0 1024x768x24
    - export DISPLAY=":1"
    - wget -O processing.tgz http://download.processing.org/processing-3.3-linux64.tgz
    - tar xvfz processing.tgz 
    - sudo chmod +x processing-3.3/processing-java
script: ./processing-3.3/processing-java --sketch=$TRAVIS_BUILD_DIR --run DoTravisDebug
